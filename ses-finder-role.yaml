AWSTemplateFormatVersion: "2010-09-09"
Description: "Ruolo temporaneo read-only per cercare eventi SES in CloudTrail"

Parameters:
  MasterAccountId:
    Type: String
    Description: "Account ID del master account che assumera' il ruolo"

Resources:
  SESFinderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SESFinderReadOnly
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${MasterAccountId}:root"
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: CloudTrailLookupOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "cloudtrail:LookupEvents"
                Resource: "*"
